<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celleris Supply - Em Construção</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #1a0f3d, transparent 40%),
                  radial-gradient(circle at 80% 70%, #0d2a5c, transparent 40%),
                  #050508;
      color: #fff;
    }

    .content {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 180px;
      margin-bottom: 30px;
      filter: drop-shadow(0 0 15px rgba(123,92,255,0.3));
    }

    h1 {
      font-size: 14px;
      letter-spacing: 4px;
      color: #aaa;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 6px;
      margin-bottom: 15px;
    }

    p {
      color: #bbb;
      max-width: 420px;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 14px 26px;
      background: linear-gradient(90deg, #7b5cff, #3b82f6);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
      margin-bottom: 15px;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(123,92,255,0.5);
    }

    .domain {
      margin-top: 10px;
      color: #7b5cff;
      font-size: 14px;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: #666;
    }

    /* 🔥 WhatsApp flutuante */
    .whatsapp-float {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 60px;
      height: 60px;
      background: #25D366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 0 15px rgba(37, 211, 102, 0.5);
      z-index: 999;
      transition: 0.3s;
    }

    .whatsapp-float:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(37, 211, 102, 0.8);
    }

    .whatsapp-float svg {
      width: 30px;
      height: 30px;
      fill: white;
    }
  </style>
</head>
<body>

<div class="content">
  <img src="img/celleris_logo.png" class="logo">

  <h1>NOSSO NOVO SITE</h1>
  <h2>EM BREVE</h2>

  <p>
    Estamos estruturando nossa plataforma para oferecer soluções completas em suprimentos industriais e corporativos.
  </p>

  <a href="https://wa.me/5511978274853" target="_blank" class="btn">
    Falar no WhatsApp
  </a>

  <div class="domain">cellerissupply.com</div>
</div>
